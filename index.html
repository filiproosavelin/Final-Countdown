<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="final_countdown_one.js" defer></script>
    <link rel="stylesheet" href="final_countdown_one.css">
    <title>The Final Countdown</title>
</head>
<body>

<div class="container">
    <h1>Din Tid Kvar</h1>
    
    <div id="form-section">
        <label for="birthdate">Födelsedatum (ÅÅ-MM-DD)</label>
        <input type="text" id="birthdate" placeholder="t.ex. 95-09-10" required>

        <label for="gender">Biologiskt kön</label>
        <select id="gender">
            <option value="male">Man</option>
            <option value="female">Kvinna</option>
        </select>

        <div class="row">
            <div>
                <label for="height">Längd (cm)</label>
                <input type="number" id="height" placeholder="t.ex. 175" required>
            </div>
            <div>
                <label for="weight">Vikt (kg)</label>
                <input type="number" id="weight" placeholder="t.ex. 70" required>
            </div>
        </div>

        <label for="smoking">Röker du?</label>
        <select id="smoking">
            <option value="no">Nej</option>
            <option value="yes">Ja</option>
        </select>

        <label for="exercise">Hur ofta tränar du?</label>
        <select id="exercise">
            <option value="0">Sällan/Aldrig</option>
            <option value="1">1-2 gånger i veckan</option>
            <option value="2">3+ gånger i veckan</option>
        </select>
<!-- NYTT: Växtbaserad kost -->
        <label for="plant_based">Hur ser din kosthållning ut?</label>
        <select id="plant_based">
            <option value="animal">Jag äter animaliskt</option>
            <option value="vegetarian">Jag äter vegetariskt</option>
            <option value="vegan">Jag äter veganskt</option>
        </select>

        <!-- NYTT: Pulshöjande aktivitet -->
        <label for="cardio">Tränar du regelbundet pulshöjande aktivitet?</label>
        <select id="cardio">
            <option value="no">Nej</option>
            <option value="yes">Ja, flera gånger i veckan</option>
        </select>

        <!-- NYTT: Vattenintag -->
        <label for="water">Hur mycket vatten dricker du per dag?</label>
        <select id="water">
            <option value="less">Mindre än 2 liter</option>
            <option value="more">2 liter eller mer</option>
        </select>

        <label for="alcohol">Alkoholvanor</label>
        <select id="alcohol">
            <option value="low">Dricker sällan/aldrig</option>
            <option value="moderate">Måttlig konsumtion</option>
            <option value="high">Hög konsumtion</option>
        </select>

        <label for="sleep">Hur mycket sover du i snitt per natt?</label>
        <select id="sleep">
            <option value="poor">Mindre än 6 timmar</option>
            <option value="good">6-8 timmar</option>
            <option value="excessive">Mer än 8 timmar</option>
        </select>

        <label for="stress">Upplever du hög stress i vardagen?</label>
        <select id="stress">
            <option value="no">Nej, hanterbar stress</option>
            <option value="yes">Ja, kronisk stress</option>
        </select>

        <button onclick="calculateTimeLeft()">Se ditt resultat</button>
    </div>

    <div id="result-section">
        <h2>Uppskattad tid kvar att leva:</h2>
        <div class="countdown" id="hours-left">0</div>
        <p>Timmar</p>
        <p id="stats-info" style="font-size: 0.85em; color: #aaa; line-height: 1.4;"></p>
        <button onclick="location.reload()" style="background-color: #444;">Börja om</button>
    </div>
</div>
</body>
</html>
